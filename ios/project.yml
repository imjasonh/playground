name: Playground

# This single YAML is the source of truth for the one iOS app (and the discovery
# marker for the iOS app type). There is exactly ONE iOS app in this repo — the
# "Playground" container — and it hosts many experiments internally. Add new
# experiments under Sources/Experiments/<Name>/ (one folder each), self-declare
# via a *Experiment.swift, and append that entry to ExperimentCatalog; do NOT
# create additional top-level iOS app directories.
#
# Embedded Apple extensions (each needs its own Bundle ID; see AGENTS.md):
#   - T9Keyboard: Custom Keyboard
#   - RideMonitorWidget: Ride Monitor Live Activity (WidgetKit)
#   - RideMonitorWatch: Ride Monitor companion Watch app
#
# `xcodegen generate` produces Playground.xcodeproj, which is git-ignored.

options:
  bundleIdPrefix: io.github.imjasonh
  deploymentTarget:
    iOS: "16.2"
    watchOS: "9.0"
  createIntermediateGroups: true
  minimumXcodeGenVersion: "2.38.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    VERSIONING_SYSTEM: apple-generic
    # DEVELOPMENT_TEAM is injected by CI (fastlane / xcargs) at signing time so
    # the checked-in spec stays account-agnostic.

targets:
  Playground:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Shared/T9
      - path: Shared/RideMonitor
    dependencies:
      - target: T9Keyboard
        embed: true
      - target: RideMonitorWidget
        embed: true
      - target: RideMonitorWatch
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.imjasonh.playground
        TARGETED_DEVICE_FAMILY: "1,2"
        # App icon (required by App Store / TestFlight). The single 1024px icon
        # in Assets.xcassets is expanded to all required sizes at build time.
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Ride Monitor summaries use FoundationModels when Apple Intelligence is
        # available (iOS 26+). Weak-link so the host still launches on older OS.
        OTHER_LDFLAGS: "$(inherited) -weak_framework FoundationModels"
        CODE_SIGN_ENTITLEMENTS: Playground.entitlements
    entitlements:
      path: Playground.entitlements
      properties:
        # Ride Monitor launches the Watch companion via HealthKit startWatchApp
        # so the wrist stays on the ride UI without the user hunting for it.
        com.apple.developer.healthkit: true
    # Explicit Info.plist (generated by XcodeGen) so we can set a unique
    # CFBundleName. The bundle name "Playground" is already taken on the App
    # Store → ITMS-90129, so both names use the unique App Store record name
    # "ImJasonH Playground". The Xcode target, scheme, and Swift module stay
    # "Playground" so tests and signing are unaffected.
    info:
      path: Playground-Info.plist
      properties:
        CFBundleName: ImJasonH Playground
        CFBundleDisplayName: ImJasonH Playground
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleInfoDictionaryVersion: "6.0"
        CFBundlePackageType: $(PRODUCT_BUNDLE_PACKAGE_TYPE)
        # Map the version strings to build settings so the CI build-number bump
        # (CURRENT_PROJECT_VERSION via xcargs) flows into CFBundleVersion.
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSRequiresIPhoneOS: true
        UIApplicationSupportsIndirectInputEvents: true
        UILaunchScreen: {}
        # No non-exempt encryption → TestFlight upload doesn't stall on the
        # export-compliance question.
        ITSAppUsesNonExemptEncryption: false
        # Ride Monitor Live Activity (Lock Screen / Dynamic Island).
        NSSupportsLiveActivities: true
        # Ride Monitor: motion + background location. Snore Log: microphone +
        # background audio. UIBackgroundModes is an Info.plist key only (no
        # entitlement / App ID capability), so these ship to TestFlight without
        # changing signing.
        NSMotionUsageDescription: Ride Monitor uses motion to detect jolts while you ride. Follow the Hum uses AirPods head tracking so the hum stays fixed in the world as you turn your head.
        NSLocationWhenInUseUsageDescription: Ride Monitor records where jolts happen. Follow the Hum uses your location and compass to hide a nearby spot and steer you with sound.
        NSLocationAlwaysAndWhenInUseUsageDescription: Records where jolts and crashes happen and keeps the ride recording while the screen is off.
        NSMicrophoneUsageDescription: Snore Log listens with the microphone while you sleep and saves short clips when snoring-like sounds are detected.
        NSCameraUsageDescription: Z-Camera uses the depth camera to show only the slice of space between the near and far distance sliders. Voxel World uses the camera and ARKit to rebuild the room as colored voxels.
        NSHealthShareUsageDescription: Ride Monitor uses HealthKit so the Apple Watch companion can stay active during a ride and record heart rate, energy, Watch distance, and cycling cadence/speed/power when a sensor is paired. GPS and jolt data stay in the app; the Watch workout is also saved to Health.
        NSHealthUpdateUsageDescription: Ride Monitor uses HealthKit so the Apple Watch companion can stay active during a ride and record heart rate, energy, Watch distance, and cycling cadence/speed/power when a sensor is paired. GPS and jolt data stay in the app; the Watch workout is also saved to Health.
        UIBackgroundModes:
          - location
          - audio
        # iPad multitasking requires declared orientations or the upload is
        # rejected.
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight

  T9Keyboard:
    type: app-extension
    platform: iOS
    sources:
      - path: T9Keyboard
        excludes:
          - README.md
          - "*.png"
      - path: Shared/T9
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.imjasonh.playground.t9keyboard
        TARGETED_DEVICE_FAMILY: "1,2"
        SKIP_INSTALL: YES
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @executable_path/../../Frameworks"
    info:
      path: T9Keyboard-Info.plist
      properties:
        CFBundleDisplayName: T9 Multi-tap
        CFBundleName: T9 Multi-tap
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundlePackageType: XPC!
        NSExtension:
          NSExtensionAttributes:
            IsASCIICapable: true
            PrefersRightToLeft: false
            PrimaryLanguage: en-US
            # Sandboxed keyboard — no network / shared container access.
            RequestsOpenAccess: false
          NSExtensionPointIdentifier: com.apple.keyboard-service
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).KeyboardViewController

  RideMonitorWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: RideMonitorWidget
      - path: Shared/RideMonitor
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.imjasonh.playground.ridemonitorwidget
        TARGETED_DEVICE_FAMILY: "1,2"
        SKIP_INSTALL: YES
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @executable_path/../../Frameworks"
        PRODUCT_NAME: RideMonitorWidget
    info:
      path: RideMonitorWidget-Info.plist
      properties:
        CFBundleDisplayName: Ride Monitor
        CFBundleName: Ride Monitor
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundlePackageType: XPC!
        NSSupportsLiveActivities: true
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

  RideMonitorWatch:
    type: application
    platform: watchOS
    sources:
      - path: RideMonitorWatch
      - path: Shared/RideMonitor
        excludes:
          # ActivityKit is iOS-only; Watch only needs the snapshot DTO + profile view.
          - RideMonitorAttributes.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.imjasonh.playground.watch
        TARGETED_DEVICE_FAMILY: "4"
        SKIP_INSTALL: YES
        SDKROOT: watchos
        PRODUCT_NAME: RideMonitorWatch
        # App Store / TestFlight require a Watch app icon in an asset catalog
        # (ITMS-90713 / CFBundleIconName). Same single-1024 pattern as the iOS host.
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: RideMonitorWatch/RideMonitorWatch.entitlements
    entitlements:
      path: RideMonitorWatch/RideMonitorWatch.entitlements
      properties:
        # Frontmost HKWorkoutSession while a phone ride is active.
        com.apple.developer.healthkit: true
    info:
      path: RideMonitorWatch-Info.plist
      properties:
        CFBundleDisplayName: Ride Monitor
        CFBundleName: Ride Monitor
        # Pair with ASSETCATALOG_COMPILER_APPICON_NAME so App Store Connect
        # sees CFBundleIconName (ITMS-90713).
        CFBundleIconName: AppIcon
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        # Required for single-target watchOS apps; without this the iPhone
        # simulator refuses to install the host app that embeds the Watch app.
        WKApplication: true
        WKCompanionAppBundleIdentifier: io.github.imjasonh.playground
        WKWatchOnly: false
        NSHealthShareUsageDescription: Ride Monitor uses HealthKit so it can stay on-wrist during a ride and collect heart rate, energy, Watch distance, and cycling cadence/speed/power when a sensor is paired. GPS and jolts are recorded on iPhone; the workout is saved to Health when the ride ends.
        NSHealthUpdateUsageDescription: Ride Monitor uses HealthKit so it can stay on-wrist during a ride and collect heart rate, energy, Watch distance, and cycling cadence/speed/power when a sensor is paired. GPS and jolts are recorded on iPhone; the workout is saved to Health when the ride ends.
        # Keeps the companion running under an HKWorkoutSession (wrist-raise
        # returns to Ride Monitor instead of the watch face).
        UIBackgroundModes:
          - workout-processing

  PlaygroundTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests/PlaygroundTests
    dependencies:
      - target: Playground
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.imjasonh.playground.tests
        GENERATE_INFOPLIST_FILE: YES

  PlaygroundUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - Tests/PlaygroundUITests
    dependencies:
      - target: Playground
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.imjasonh.playground.uitests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  Playground:
    build:
      targets:
        Playground: all
        T9Keyboard: all
        RideMonitorWidget: all
        RideMonitorWatch: all
    test:
      gatherCoverageData: true
      targets:
        - PlaygroundTests
        - PlaygroundUITests
    run:
      config: Debug
    archive:
      config: Release
