# Toolchain pin for this Cloudflare Worker crate (the Rust analog of a Go app's
# go.mod version). Several transitive dependencies raised their MSRV in later
# patch releases, so the crate and its committed Cargo.lock target Rust 1.83.
# CI reads this channel; rustup uses the whole file for local builds too.
[toolchain]
channel = "1.83.0"
components = ["clippy", "rustfmt"]
targets = ["wasm32-unknown-unknown"]
