# Cloudflare Workers configuration for the git smart-HTTP server.
#
# This project has no index.html, so the GitHub Pages workflows skip it; it is
# deployed to Cloudflare by `deploy-workers.yml` on pushes to `main` (using the
# CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID repo secrets). The deploy
# self-provisions the KV namespace (placeholder id substituted) and creates the
# R2 bucket below if it doesn't exist yet.

# Deployed at git.<account>.workers.dev.
name = "git"
main = "build/worker/shim.mjs"
compatibility_date = "2026-06-16"

# Build the wasm Worker from Rust. The script wraps `worker-build --release`
# (pinned to 0.1.x for worker 0.5 / wasm-bindgen 0.2.105 — see Cargo.toml) and
# stashes any package.json created by wrangler-action so wasm-bindgen does not
# embed it (worker-build 0.1.x cannot parse the nested dependencies object).
[build]
command = "bash scripts/worker-build.sh"

# All bulk data: packs, pack indexes, file-log segments.
[[r2_buckets]]
binding = "GIT_BUCKET"
bucket_name = "git-server-repos"

# Per-repo mutable state (refs + pack manifest), one Durable Object instance
# per repo — the serialization point that makes pushes atomic.
[durable_objects]
bindings = [
  { name = "REPO_STATE", class_name = "RepoStateDo" },
]

[[migrations]]
tag = "v1"
# SQLite-backed Durable Objects: same storage API, available on every
# Workers plan (`new_classes` DOs require the paid plan).
new_sqlite_classes = ["RepoStateDo"]

# Repo registry for scheduled maintenance (repos are registered on push).
# The placeholder id is substituted by .github/scripts/provision-worker-kv.py
# during deploy (it creates-or-gets the namespace).
[[kv_namespaces]]
binding = "GIT_REPOS"
id = "REPLACE_WITH_GIT_REPOS_KV_ID"
preview_id = "REPLACE_WITH_GIT_REPOS_PREVIEW_KV_ID"

# Per-invocation CPU budget. Requires a paid Workers plan (the free plan is
# capped at ~2 s, which kills pushes >~40 MB mid-scan with a 1102/503 —
# see docs/design.md "Size limits"). 300000 ms is the paid maximum and makes
# CPU a non-issue below the request-body cap; pushes scan the pack at
# ~30 MiB/s (zlib-bound), so a near-cap 100 MB push needs a few CPU-seconds.
[limits]
cpu_ms = 300000

# Nightly pack consolidation (see src/maintenance.rs): merges each repo's
# accumulated push packs into one, without recompressing anything.
[triggers]
crons = ["17 3 * * *"]

# Persist per-invocation logs and traces (opt-in!) so failures are
# diagnosable *after* the fact, not only while `wrangler tail` happens to be
# attached. Each invocation records its `outcome` — "ok", "exception",
# "exceededMemory", "exceededCpu", "canceled" — plus our structured
# {"evt":"req"} lines. Automatic tracing captures the fetch handler, R2/KV/DO
# binding calls, and our custom spans (`git.handle`, pipeline phase attrs).
# `outcome=exceededMemory` with no {"evt":"req"} line is the isolate-OOM
# (error 1102 / client-visible 503) signature that took manual probing to
# diagnose the first time. Head-based sampling at 100% is fine at prototype
# traffic; dial down before serious volume.
[observability]
enabled = true
head_sampling_rate = 1

[observability.traces]
enabled = true
head_sampling_rate = 1

# Optional (uncomment on Business/Enterprise zones, whose request-body cap is
# higher than the Free/Pro 100 MB): the server-side per-push size limit, in
# bytes. Defaults to 100 MB to match the edge cap — see docs/design.md
# "Size limits".
# [vars]
# PUSH_LIMIT_BYTES = "200000000"
