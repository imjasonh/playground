<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"
    />
    <meta name="theme-color" content="#0d1117" />
    <meta name="color-scheme" content="dark" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="description"
      content="A gyroscope-powered bubble (spirit) level for your phone."
    />
    <title>Bubble Level</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <noscript>
        <p class="noscript">
          This bubble level needs JavaScript (and a device with motion sensors)
          to run. Please enable JavaScript.
        </p>
      </noscript>

      <header class="header">
        <h1>Bubble Level</h1>
        <p class="subtitle">
          Lay your phone on a surface — the bubble floats to the high side, just
          like a carpenter's spirit level.
        </p>
      </header>

      <section
        id="enable-panel"
        class="enable-panel"
        hidden
        aria-live="polite"
      >
        <p id="enable-text">
          This level uses your device's motion sensors.
        </p>
        <button type="button" id="enable-btn" class="btn primary">
          Enable motion sensors
        </button>
      </section>

      <section class="readout" aria-label="Tilt readout">
        <div class="readout-main">
          <span
            id="tilt-value"
            class="tilt-value"
            role="status"
            aria-live="polite"
            >—</span
          >
          <span class="tilt-unit">° from level</span>
        </div>
        <div id="level-badge" class="level-badge" aria-live="polite">
          Waiting for sensor…
        </div>
        <dl class="axis-grid">
          <div class="axis">
            <dt>Left · Right</dt>
            <dd id="axis-x">—</dd>
          </div>
          <div class="axis">
            <dt>Front · Back</dt>
            <dd id="axis-y">—</dd>
          </div>
        </dl>
      </section>

      <section class="levels" aria-label="Levels">
        <div class="tabs" role="tablist" aria-label="Level type">
          <button
            type="button"
            class="tab"
            role="tab"
            id="tab-surface"
            aria-controls="panel-surface"
            aria-selected="true"
          >
            <span class="tab-icon" aria-hidden="true">◎</span>Surface
          </button>
          <button
            type="button"
            class="tab"
            role="tab"
            id="tab-horizontal"
            aria-controls="panel-horizontal"
            aria-selected="false"
            tabindex="-1"
          >
            <span class="tab-icon" aria-hidden="true">↔</span>Horizontal
          </button>
          <button
            type="button"
            class="tab"
            role="tab"
            id="tab-vertical"
            aria-controls="panel-vertical"
            aria-selected="false"
            tabindex="-1"
          >
            <span class="tab-icon" aria-hidden="true">↕</span>Vertical
          </button>
        </div>

        <div class="panels">
          <div
            class="panel"
            role="tabpanel"
            id="panel-surface"
            aria-labelledby="tab-surface"
          >
            <div
              id="bullseye"
              class="bullseye"
              role="img"
              aria-label="Surface level bubble position"
            >
              <span class="ring ring-outer" aria-hidden="true"></span>
              <span class="ring ring-inner" aria-hidden="true"></span>
              <span class="crosshair crosshair-h" aria-hidden="true"></span>
              <span class="crosshair crosshair-v" aria-hidden="true"></span>
              <span id="bubble" class="bubble" aria-hidden="true"></span>
            </div>
          </div>

          <div
            class="panel"
            role="tabpanel"
            id="panel-horizontal"
            aria-labelledby="tab-horizontal"
            hidden
          >
            <div
              id="tube-h"
              class="tube tube-h"
              role="img"
              aria-label="Left to right level"
            >
              <span class="tube-target" aria-hidden="true"></span>
              <span id="tube-h-bubble" class="tube-bubble" aria-hidden="true"></span>
            </div>
          </div>

          <div
            class="panel"
            role="tabpanel"
            id="panel-vertical"
            aria-labelledby="tab-vertical"
            hidden
          >
            <div
              id="tube-v"
              class="tube tube-v"
              role="img"
              aria-label="Front to back level"
            >
              <span class="tube-target" aria-hidden="true"></span>
              <span id="tube-v-bubble" class="tube-bubble" aria-hidden="true"></span>
            </div>
          </div>
        </div>
      </section>

      <section class="controls" aria-label="Controls">
        <button type="button" id="calibrate-btn" class="btn">
          Calibrate to surface
        </button>
        <button type="button" id="reset-btn" class="btn" disabled>
          Reset calibration
        </button>
      </section>

      <p id="status" class="status" role="status" aria-live="polite"></p>

      <p class="hint" id="hint"></p>
    </main>

    <script type="module" src="src/app.js"></script>
  </body>
</html>
