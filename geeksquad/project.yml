name: GeekSquad

# Discovery marker for macOS apps: project.yml with platform: macOS
# (see discover-macos-apps.sh). Product design: docs/geeksquad-design.md

options:
  bundleIdPrefix: io.github.imjasonh
  deploymentTarget:
    # Manual Toolbox works on recent macOS; Foundation Models triage (Phase 2)
    # will require Apple Intelligence / macOS 26+.
    macOS: "14.0"
  createIntermediateGroups: true
  minimumXcodeGenVersion: "2.38.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "0.1.3"
    CURRENT_PROJECT_VERSION: "10"
    VERSIONING_SYSTEM: apple-generic

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"

targets:
  GeekSquad:
    type: application
    platform: macOS
    sources:
      - path: Sources
    dependencies:
      - package: Sparkle
        product: Sparkle
      - sdk: CoreWLAN.framework
      - sdk: Network.framework
      - sdk: AppKit.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.imjasonh.geeksquad
        PRODUCT_NAME: GeekSquad
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Weak-link so the app still launches when FoundationModels isn't present;
        # chat gates on availability at runtime (same pattern as ios Ride Monitor).
        OTHER_LDFLAGS: "$(inherited) -weak_framework FoundationModels"
    entitlements:
      path: GeekSquad.entitlements
      properties:
        com.apple.security.cs.disable-library-validation: true
    info:
      path: GeekSquad-Info.plist
      properties:
        CFBundleName: Geek Squad
        CFBundleDisplayName: Geek Squad
        CFBundleIconName: AppIcon
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleInfoDictionaryVersion: "6.0"
        CFBundlePackageType: $(PRODUCT_BUNDLE_PACKAGE_TYPE)
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSMinimumSystemVersion: "$(MACOSX_DEPLOYMENT_TARGET)"
        LSApplicationCategoryType: public.app-category.utilities
        NSHighResolutionCapable: true
        NSPrincipalClass: NSApplication
        ITSAppUsesNonExemptEncryption: false
        NSLocalNetworkUsageDescription: Geek Squad probes local reachability and HTTP endpoints to diagnose connectivity.
        NSLocationUsageDescription: Optional — used only to show the current Wi‑Fi network name while diagnosing.
        SUFeedURL: https://imjasonh.github.io/playground/macos/geeksquad/appcast.xml
        SUPublicEDKey: pFvSb5Quq/HBMc9EvhTTD5zbctf7MCuAks0mXaZiZW0=
        SUEnableAutomaticChecks: true
        SUScheduledCheckInterval: 86400

  GeekSquadTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/GeekSquadTests
    dependencies:
      - target: GeekSquad
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.imjasonh.geeksquad.tests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  GeekSquad:
    build:
      targets:
        GeekSquad: all
    test:
      gatherCoverageData: true
      targets:
        - GeekSquadTests
    run:
      config: Debug
    archive:
      config: Release
