name: Test

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Discover changed browser and Go apps
        id: discover
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
          BEFORE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: bash .github/scripts/discover-changed-apps.sh

      - uses: actions/setup-node@v4
        if: ${{ steps.discover.outputs.apps != '[]' || contains(steps.discover.outputs.modules, 'node-image') }}
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: '**/package-lock.json'

      - name: Run tests for changed apps
        if: ${{ steps.discover.outputs.apps != '[]' }}
        env:
          APPS: ${{ steps.discover.outputs.apps }}
        run: bash .github/scripts/test-browser-apps.sh

      - uses: actions/setup-go@v6
        if: ${{ steps.discover.outputs.modules != '[]' }}
        with:
          go-version: 'stable'
          check-latest: true
          cache: false

      - name: Build and test changed Go apps
        if: ${{ steps.discover.outputs.modules != '[]' }}
        env:
          MODULES: ${{ steps.discover.outputs.modules }}
        run: bash .github/scripts/test-go-modules.sh

      # Baseline stable toolchain; an app's rust-toolchain.toml (e.g. web-push
      # pins 1.83) overrides it per directory when cargo runs.
      - uses: dtolnay/rust-toolchain@stable
        if: ${{ steps.discover.outputs.rust != '[]' }}
        with:
          components: clippy, rustfmt
          targets: wasm32-unknown-unknown

      - name: Lint, build, and test changed Rust apps
        if: ${{ steps.discover.outputs.rust != '[]' }}
        env:
          RUST_APPS: ${{ steps.discover.outputs.rust }}
        run: bash .github/scripts/test-rust-apps.sh
