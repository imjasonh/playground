name: Test

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      apps: ${{ steps.discover.outputs.apps }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find testable apps in changed directories
        id: discover
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
          BEFORE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" = "pull_request" ]; then
            git fetch origin "$BASE_REF"
            changed=$(git diff --name-only "origin/${BASE_REF}...HEAD")
          elif [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
            echo "No prior commit; testing all testable apps."
            apps=$(bash .github/scripts/discover-testable-apps.sh --all)
            echo "apps=${apps}" >> "$GITHUB_OUTPUT"
            echo "Testable apps: ${apps}"
            exit 0
          else
            changed=$(git diff --name-only "$BEFORE_SHA" "$HEAD_SHA")
          fi

          if [ -z "$changed" ]; then
            apps='[]'
          else
            apps=$(printf '%s\n' "$changed" | bash .github/scripts/discover-testable-apps.sh --from-changes)
          fi

          echo "apps=${apps}" >> "$GITHUB_OUTPUT"
          echo "Changed paths:"
          printf '%s\n' "$changed"
          echo "Testable apps: ${apps}"

  test:
    needs: discover
    if: needs.discover.outputs.apps != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJson(needs.discover.outputs.apps) }}
    name: test (${{ matrix.app }})
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: ${{ matrix.app }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ matrix.app }}
        run: npm ci

      - name: Run unit tests
        working-directory: ${{ matrix.app }}
        run: npm test

      - name: Install Playwright browsers
        working-directory: ${{ matrix.app }}
        run: |
          if node -e "const s=require('./package.json').scripts||{}; process.exit(s['test:e2e']?0:1)"; then
            npx playwright install --with-deps chromium
          fi

      - name: Run e2e tests
        working-directory: ${{ matrix.app }}
        run: |
          if node -e "const s=require('./package.json').scripts||{}; process.exit(s['test:e2e']?0:1)"; then
            npm run test:e2e
          else
            echo "No test:e2e script; skipping."
          fi

  no-tests:
    needs: discover
    if: needs.discover.outputs.apps == '[]'
    runs-on: ubuntu-latest
    steps:
      - run: echo "No testable apps changed (need changes under an app dir with index.html, package.json, and a test script)."
