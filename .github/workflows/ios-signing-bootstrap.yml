name: iOS signing bootstrap

# Creates the iOS distribution certificate + App Store provisioning profiles
# and stores them, encrypted, in your private `match` repo. Used for:
#   - manual greenfield setup / cert recovery (workflow_dispatch)
#   - automatic re-bootstrap when a needs-ios-bootstrap PR merges
#     (workflow_call from ios-bootstrap-on-merge.yml)
#
# Day-to-day: PRs get the needs-ios-bootstrap label from
# ios-bootstrap-label.yml; merge triggers this lane. In-app experiments do not
# need bootstrap.

on:
  workflow_dispatch:
    inputs:
      app:
        description: iOS app directory to bootstrap signing for
        required: true
        type: string
        default: ios
  workflow_call:
    inputs:
      app:
        description: iOS app directory to bootstrap signing for
        required: false
        type: string
        default: ios

jobs:
  bootstrap:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Verify signing secrets are present
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_API_KEY_P8: ${{ secrets.ASC_API_KEY_P8 }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
        run: |
          missing=0
          for v in ASC_KEY_ID ASC_ISSUER_ID ASC_API_KEY_P8 APPLE_TEAM_ID \
                   MATCH_GIT_URL MATCH_PASSWORD MATCH_GIT_BASIC_AUTHORIZATION; do
            if [ -z "${!v}" ]; then
              echo "::error title=Missing secret::$v is not set. See docs/ios-testflight-setup.md."
              missing=1
            fi
          done
          exit "$missing"

      - name: Create + store signing assets
        working-directory: ${{ inputs.app }}
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_API_KEY_P8: ${{ secrets.ASC_API_KEY_P8 }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
        run: |
          bundle install
          bundle exec fastlane signing_bootstrap
