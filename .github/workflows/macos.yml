name: macOS

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: macos-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Cheap Linux job: figure out whether any macOS app changed before paying for
  # a macOS runner. Mirrors ios.yml / discover-changed-apps.sh.
  discover:
    runs-on: ubuntu-latest
    outputs:
      macos: ${{ steps.discover.outputs.macos }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Discover changed macOS apps
        id: discover
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
          BEFORE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: bash .github/scripts/discover-changed-apps.sh

  macos:
    needs: discover
    if: ${{ needs.discover.outputs.macos != '[]' }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      # Release (notarize + Sparkle) lands in a follow-up PR. Until those secrets
      # and the fastlane beta lane exist, CI always tests only.
      - name: Determine mode
        id: mode
        env:
          MACOS_DEVELOPER_ID_P12: ${{ secrets.MACOS_DEVELOPER_ID_P12 }}
        run: |
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/main" ] && [ -n "$MACOS_DEVELOPER_ID_P12" ]; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "deploy=false" >> "$GITHUB_OUTPUT"
          fi
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/main" ] && [ -z "$MACOS_DEVELOPER_ID_P12" ]; then
            echo "::warning title=macOS release skipped::Developer ID / Sparkle secrets are not configured; ran tests only. See docs/macos-sparkle-design.md."
          fi

      - name: Test and (on main) ship changed macOS apps
        env:
          MACOS_APPS: ${{ needs.discover.outputs.macos }}
          DEPLOY: ${{ steps.mode.outputs.deploy }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_API_KEY_P8: ${{ secrets.ASC_API_KEY_P8 }}
          MACOS_DEVELOPER_ID_P12: ${{ secrets.MACOS_DEVELOPER_ID_P12 }}
          MACOS_DEVELOPER_ID_PASSWORD: ${{ secrets.MACOS_DEVELOPER_ID_PASSWORD }}
          SPARKLE_EDDSA_PRIVATE_KEY: ${{ secrets.SPARKLE_EDDSA_PRIVATE_KEY }}
        run: bash .github/scripts/macos-ci.sh
