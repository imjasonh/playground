name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

# Production, preview, and cleanup workflows all update the same branch.
concurrency:
  group: gh-pages-publish
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build site
        run: |
          mkdir -p dist

          # Copy every top-level directory that contains an index.html
          for dir in */; do
            d="${dir%/}"
            if [ -f "$d/index.html" ]; then
              cp -r "$d" "dist/$d"
            fi
          done

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          keep_files: true   # preserves preview/ directory from PR deployments

      # Regenerate the root index from the published site so it lists the apps
      # and any active PR previews (preview/pr-<N>/preview.json). Runs after the
      # deploy above so the gh-pages checkout reflects the just-published apps.
      - name: Check out gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      - name: Refresh site index
        env:
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
        run: |
          bash .github/scripts/publish-site-index.sh gh-pages "$REPO_URL" "chore: update site index"
