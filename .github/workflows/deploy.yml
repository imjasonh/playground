name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version: 'stable'
          check-latest: true
          cache: false

      - name: Build site
        run: |
          mkdir -p dist

          # Copy every top-level directory that contains an index.html
          for dir in */; do
            d="${dir%/}"
            if [ -f "$d/index.html" ]; then
              cp -r "$d" "dist/$d"
            fi
          done

          bash .github/scripts/build-gitdb-web.sh "dist/gitdb-web/generated"

          # Generate a root index listing all apps
          items=$(
            for d in dist/*/; do
              name="${d#dist/}"
              name="${name%/}"
              printf '  <li><a href="%s/">%s</a></li>\n' "$name" "$name"
            done
          )
          TITLE='Playground' \
          HEADING='Playground' \
          ITEMS="$items" \
          python - <<'PY' > dist/index.html
          import os
          from pathlib import Path

          template = Path(".github/pages/index.html.tmpl").read_text()
          print(
              template
              .replace("__TITLE__", os.environ["TITLE"])
              .replace("__HEADING__", os.environ["HEADING"])
              .replace("__ITEMS__", os.environ["ITEMS"]),
              end="",
          )
          PY

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          keep_files: true   # preserves preview/ directory from PR deployments
