name: web-push

# The shared Test workflow only runs npm-based GitHub Pages apps. The web-push
# directory is a Rust Cloudflare Worker, so it has its own job that builds it,
# lints it, and runs its unit + integration tests. Scoped to its own path so it
# stays out of the way of the other apps.
on:
  push:
    branches: [main]
    paths:
      - 'web-push/**'
      - '.github/workflows/web-push.yml'
  pull_request:
    paths:
      - 'web-push/**'
      - '.github/workflows/web-push.yml'

concurrency:
  group: web-push-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: web-push

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Pinned to the crate's MSRV so CI matches the locked dependency set.
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.83.0
          targets: wasm32-unknown-unknown
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: web-push

      - name: Format
        run: cargo fmt --check

      - name: Clippy (native)
        run: cargo clippy --locked --all-targets -- -D warnings

      - name: Clippy (wasm Worker)
        run: cargo clippy --locked --target wasm32-unknown-unknown -- -D warnings

      - name: Test (unit + integration)
        run: cargo test --locked

      - name: Build Worker (wasm release)
        run: cargo build --locked --release --target wasm32-unknown-unknown
