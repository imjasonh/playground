name: Deploy Cloudflare Workers

on:
  push:
    branches: [main]
  # Manual "Run workflow": redeploy every Worker app on demand (e.g. to roll a
  # config/secret change that didn't touch the app's own directory).
  workflow_dispatch:

# Worker deploys are independent of the GitHub Pages publish, but serialize
# among themselves so two pushes don't race the same Cloudflare deployment.
concurrency:
  group: deploy-workers
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # Select the Worker apps to deploy: the ones this push changed, or every app
  # on the first push and on a manual workflow_dispatch.
  discover:
    runs-on: ubuntu-latest
    outputs:
      workers: ${{ steps.discover.outputs.workers }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Discover Worker apps to deploy
        id: discover
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: bash .github/scripts/discover-changed-workers.sh

  deploy:
    needs: discover
    if: ${{ needs.discover.outputs.workers != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      # Deploy each Worker independently; one failing deploy shouldn't cancel
      # the others.
      fail-fast: false
      matrix:
        app: ${{ fromJSON(needs.discover.outputs.workers) }}
    steps:
      - uses: actions/checkout@v4

      # Each Worker app pins its toolchain via rust-toolchain.toml; rustup honors
      # it when cargo runs in the app directory. wrangler's [build] command
      # (worker-build) compiles the wasm artifact during deploy.
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Deploy ${{ matrix.app }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: ${{ matrix.app }}
          # wrangler-action defaults to an old bundled wrangler (3.x); pin a
          # current v4 so deploys don't run on an out-of-date CLI. Bump this
          # periodically (the dependency-update bot doesn't manage it).
          wranglerVersion: "4.107.0"
          # Before deploying, create-or-get the KV namespaces this Worker needs
          # and rewrite the placeholder ids in wrangler.toml with the real ones.
          preCommands: python3 "$GITHUB_WORKSPACE/.github/scripts/provision-worker-kv.py"
          # After deploying (the script now exists), get-or-generate its
          # VAPID_PRIVATE_KEY secret. Both commands inherit CLOUDFLARE_API_TOKEN
          # and CLOUDFLARE_ACCOUNT_ID from wrangler-action and run in the app dir.
          postCommands: bash "$GITHUB_WORKSPACE/.github/scripts/ensure-worker-vapid.sh"
