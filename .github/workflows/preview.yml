name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

# Production, preview, and cleanup workflows all update the same branch.
concurrency:
  group: gh-pages-publish
  cancel-in-progress: false

permissions:
  actions: read
  contents: write
  pages: write
  pull-requests: write

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build preview
        run: |
          PR=${{ github.event.pull_request.number }}
          mkdir -p "dist/preview/pr-${PR}"

          for dir in */; do
            d="${dir%/}"
            if [ -f "$d/index.html" ]; then
              cp -r "$d" "dist/preview/pr-${PR}/$d"
            fi
          done

          # Index listing all apps in this preview
          items=$(
            for d in dist/preview/pr-${PR}/*/; do
              name="${d#dist/preview/pr-${PR}/}"
              name="${name%/}"
              printf '  <li><a href="%s/">%s</a></li>\n' "$name" "$name"
            done
          )
          TITLE="Preview — PR #${PR}" \
          HEADING="Preview — PR #${PR}" \
          ITEMS="$items" \
          python - <<'PY' > "dist/preview/pr-${PR}/index.html"
          import os
          from pathlib import Path

          template = Path(".github/pages/index.html.tmpl").read_text()
          print(
              template
              .replace("__TITLE__", os.environ["TITLE"])
              .replace("__HEADING__", os.environ["HEADING"])
              .replace("__ITEMS__", os.environ["ITEMS"]),
              end="",
          )
          PY

      - name: Deploy preview
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          keep_files: true   # preserves production apps and other PR previews

      - name: Ensure GitHub Pages publishes this commit
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

            // This repo serves Pages with the legacy "deploy from a branch"
            // builder on gh-pages. deploy/preview/cleanup AND the hourly
            // nypd-choppers scrape all push to that one branch, and the builder
            // only ever serves the LAST successful build — so when pushes land
            // close together an earlier build gets cancelled ("errored", 0s) or
            // stalls in "building", leaving the newest commit (this preview)
            // unpublished. Poll the build; if it errors, serves a stale commit,
            // or stalls, explicitly request a rebuild of the current tip so the
            // preview actually goes live.
            const timeoutMs = 12 * 60 * 1000;
            const pollMs = 15 * 1000;
            const stallMs = 3 * 60 * 1000; // "building" longer than this => nudge
            const startedAt = Date.now();

            const { data: ref } = await github.rest.git.getRef({
              owner, repo, ref: 'heads/gh-pages',
            });
            const tip = ref.object.sha;
            core.info(`Ensuring Pages serves gh-pages commit ${tip}`);

            let lastRequestAt = 0;
            const requestRebuild = async (why) => {
              // Never hammer the builder; one request per ~90s at most.
              if (Date.now() - lastRequestAt < 90 * 1000) return;
              lastRequestAt = Date.now();
              core.info(`Requesting a Pages rebuild (${why}).`);
              try {
                await github.rest.repos.requestPagesBuild({ owner, repo });
              } catch (e) {
                core.info(`Rebuild request failed (${e.status || e.message}); will retry.`);
              }
            };

            while (Date.now() - startedAt < timeoutMs) {
              let build;
              try {
                ({ data: build } = await github.rest.repos.getLatestPagesBuild({ owner, repo }));
              } catch (e) {
                core.warning(`Could not read Pages build status (${e.status || e.message}); skipping wait.`);
                return;
              }

              const buildAge = Date.now() - Date.parse(build.updated_at || build.created_at || 0);
              core.info(`Pages build: status=${build.status} commit=${build.commit} age=${Math.round(buildAge / 1000)}s`);

              if (build.status === 'built') {
                if (build.commit === tip) {
                  core.info('Pages is serving this commit.');
                  return;
                }
                // A newer push (e.g. the scrape) may legitimately have advanced
                // the tip; keep_files means it still contains this preview, so a
                // rebuild of the current tip publishes us too.
                await requestRebuild('serving an older commit');
              } else if (build.status === 'errored') {
                await requestRebuild('previous build errored');
              } else if (build.status === 'building' && buildAge > stallMs) {
                await requestRebuild('build appears stalled');
              }

              await sleep(pollMs);
            }

            core.warning(
              `Pages did not confirm publication of ${tip} within the timeout. ` +
              `The files are on gh-pages; the next successful build will serve them.`,
            );

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const url = `https://${owner}.github.io/${repo}/preview/pr-${pr}/`;
            const marker = '<!-- gh-pages-preview -->';
            const body = `${marker}\n## 🔍 Preview deployment\n\n**PR #${pr}** is deployed at: ${url}\n\n_Updated on every push to this PR._`;

            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number: pr,
            });
            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number: pr, body,
              });
            }
