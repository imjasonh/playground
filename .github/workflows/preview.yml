name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  actions: read
  contents: write
  pull-requests: write

jobs:
  # Cheap discovery before contending for the gh-pages-publish lock. Go/Rust/
  # iOS/CI-only PRs exit here with no deploy and no PR comment.
  discover:
    runs-on: ubuntu-latest
    outputs:
      apps: ${{ steps.discover.outputs.apps }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need base history to detect changed browser apps

      - name: Discover changed browser apps
        id: discover
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -euo pipefail
          git fetch --no-tags origin "$BASE_REF"
          changed=$(git diff --name-only "origin/${BASE_REF}...HEAD")
          apps=$(printf '%s\n' "$changed" | bash .github/scripts/discover-browser-apps.sh --from-changes)
          echo "Changed browser apps: ${apps}"
          echo "apps=${apps}" >> "$GITHUB_OUTPUT"
          if [ "$apps" = "[]" ]; then
            echo "No browser app changed; skipping preview deploy and PR comment."
          fi

  preview:
    needs: discover
    if: ${{ needs.discover.outputs.apps != '[]' }}
    runs-on: ubuntu-latest
    # Production, preview, and cleanup workflows all update the same branch.
    concurrency:
      group: gh-pages-publish
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Build preview
        env:
          PR: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
          APPS: ${{ needs.discover.outputs.apps }}
        run: |
          set -euo pipefail
          dest="dist/preview/pr-${PR}"
          mkdir -p "$dest"

          for dir in */; do
            d="${dir%/}"
            if [ -f "$d/index.html" ]; then
              cp -r "$d" "$dest/$d"
            fi
          done

          # Per-PR preview index listing the apps bundled in this preview.
          python3 .github/scripts/render-index.py preview \
            --dir "$dest" --pr "$PR" --repo-url "$REPO_URL" \
            --output "$dest/index.html"

          # Manifest so the production home page lists this preview (only
          # written when discover found a browser-app change).
          PR_NUMBER="$PR" PR_TITLE="$PR_TITLE" APPS="$APPS" python3 - <<'PY' > "$dest/preview.json"
          import json, os
          print(json.dumps({
              "number": int(os.environ["PR_NUMBER"]),
              "title": os.environ["PR_TITLE"],
              "apps": json.loads(os.environ["APPS"]),
          }))
          PY

      - name: Deploy preview
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          keep_files: true   # preserves production apps and other PR previews

      # Regenerate the production root index so it lists this PR's preview.
      # Runs after the deploy so the gh-pages checkout includes preview.json.
      - name: Check out gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      - name: Refresh site index
        env:
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
        run: bash .github/scripts/publish-site-index.sh gh-pages "$REPO_URL"

      - name: Wait for GitHub Pages deployment
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const workflowName = 'pages build and deployment';
            const timeoutMs = 20 * 60 * 1000;
            const pollMs = 15 * 1000;
            const startedAt = Date.now();

            function sleep(ms) {
              return new Promise((resolve) => setTimeout(resolve, ms));
            }

            const { data: ref } = await github.rest.git.getRef({
              owner,
              repo,
              ref: 'heads/gh-pages',
            });
            const targetSha = ref.object.sha;
            core.info(`Waiting for Pages deployment of gh-pages commit ${targetSha}`);

            while (Date.now() - startedAt < timeoutMs) {
              const workflows = await github.paginate(github.rest.actions.listRepoWorkflows, {
                owner,
                repo,
                per_page: 100,
              });
              const pagesWorkflow = workflows.find(
                (w) => (w.name || '').toLowerCase() === workflowName,
              );

              if (!pagesWorkflow) {
                core.info('Pages workflow is not configured; skipping wait.');
                return;
              }

              const { data: runsData } = await github.rest.actions.listWorkflowRuns({
                owner,
                repo,
                workflow_id: pagesWorkflow.id,
                head_sha: targetSha,
                event: 'push',
                per_page: 1,
              });
              const run = runsData.workflow_runs[0];

              if (!run) {
                core.info(`No Pages run yet for ${targetSha}; retrying...`);
                await sleep(pollMs);
                continue;
              }

              core.info(`Pages run ${run.id} status=${run.status} conclusion=${run.conclusion}`);
              if (run.status !== 'completed') {
                await sleep(pollMs);
                continue;
              }

              if (run.conclusion !== 'success') {
                core.setFailed(`Pages deployment for ${targetSha} concluded with ${run.conclusion}.`);
              }
              return;
            }

            core.setFailed(`Timed out waiting for Pages deployment on ${targetSha}.`);

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const url = `https://${owner}.github.io/${repo}/preview/pr-${pr}/`;
            const marker = '<!-- gh-pages-preview -->';
            const body = `${marker}\n## 🔍 Preview deployment\n\n**PR #${pr}** is deployed at: ${url}\n\n_Updated on every push to this PR._`;

            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number: pr,
            });
            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number: pr, body,
              });
            }
