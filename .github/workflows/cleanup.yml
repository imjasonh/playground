name: Cleanup PR Preview

on:
  pull_request:
    types: [closed]

# Production, preview, and cleanup workflows all update the same branch.
concurrency:
  group: gh-pages-publish
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      # The scripts and template used to regenerate the root index live on the
      # default branch, so check it out at the root.
      - name: Check out scripts
        uses: actions/checkout@v4

      - name: Check out gh-pages branch
        id: checkout
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
        # If gh-pages doesn't exist yet this step will fail — that's fine,
        # there's nothing to clean up.
        continue-on-error: true

      - name: Remove preview and refresh index
        if: steps.checkout.outcome == 'success'
        env:
          PR: ${{ github.event.pull_request.number }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
        run: |
          set -euo pipefail
          if [ -d "gh-pages/preview/pr-${PR}" ]; then
            git -C gh-pages rm -rf "preview/pr-${PR}"
          else
            echo "No preview directory found for PR #${PR}."
          fi

          # Regenerate the root index (dropping this PR's card) and push the
          # removal together with the refreshed index.
          bash .github/scripts/publish-site-index.sh gh-pages "$REPO_URL" \
            "chore: remove preview for PR #${PR} and refresh index"
