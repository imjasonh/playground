name: Cleanup PR Preview

on:
  pull_request:
    types: [closed]
  # Manual reconcile: prune every preview/pr-* whose PR is no longer open.
  # Useful after bulk-closes where some pull_request closed webhooks were dropped.
  workflow_dispatch:

# Production, preview, and cleanup workflows all update the same branch.
concurrency:
  group: gh-pages-publish
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: read

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      # The scripts and template used to regenerate the root index live on the
      # default branch, so check it out at the root.
      - name: Check out scripts
        uses: actions/checkout@v4

      - name: Check out gh-pages branch
        id: checkout
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
        # If gh-pages doesn't exist yet this step will fail — that's fine,
        # there's nothing to clean up.
        continue-on-error: true

      - name: Remove preview and refresh index
        if: steps.checkout.outcome == 'success'
        env:
          PR: ${{ github.event.pull_request.number }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # When triggered by a closed PR, remove that preview first (fast path).
          if [ -n "${PR:-}" ]; then
            if [ -d "gh-pages/preview/pr-${PR}" ]; then
              git -C gh-pages rm -rf "preview/pr-${PR}"
            else
              echo "No preview directory found for PR #${PR}."
            fi
          fi

          # Reconcile against currently open PRs so bulk-closed (or otherwise
          # missed) previews are not left listed on the home page forever.
          bash .github/scripts/prune-orphaned-previews.sh gh-pages --from-github

          # Regenerate the root index and push removals together with it.
          bash .github/scripts/publish-site-index.sh gh-pages "$REPO_URL" \
            "chore: prune closed PR previews and refresh index"
