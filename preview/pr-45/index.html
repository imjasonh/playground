<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Preview — PR #45</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #f6f7f9;
    --bg-grad: radial-gradient(1200px 600px at 50% -10%, #e8edff 0%, transparent 60%);
    --card: #ffffff;
    --card-hover: #fbfcff;
    --border: #e3e6ec;
    --text: #1b1f24;
    --muted: #656d78;
    --accent: #3b5bdb;
    --accent-soft: #eef1ff;
    --shadow: 0 1px 2px rgba(16, 24, 40, .06), 0 8px 24px rgba(16, 24, 40, .06);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0d1117;
      --bg-grad: radial-gradient(1200px 600px at 50% -10%, #1a2240 0%, transparent 60%);
      --card: #161b22;
      --card-hover: #1c2230;
      --border: #262c36;
      --text: #e6edf3;
      --muted: #99a3b3;
      --accent: #7c93ff;
      --accent-soft: #1a2138;
      --shadow: 0 1px 2px rgba(0, 0, 0, .4), 0 8px 24px rgba(0, 0, 0, .35);
    }
  }
  * { box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    margin: 0;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: var(--text);
    background: var(--bg-grad), var(--bg);
    line-height: 1.5;
  }
  main {
    max-width: 900px;
    margin: 0 auto;
    padding: clamp(2rem, 5vw, 4rem) clamp(1rem, 4vw, 2rem) 4rem;
  }
  header { margin-bottom: 2.5rem; }
  h1 {
    font-size: clamp(2rem, 6vw, 2.8rem);
    line-height: 1.1;
    letter-spacing: -0.02em;
    margin: 0;
  }
  .tagline {
    margin: .6rem 0 0;
    color: var(--muted);
    font-size: 1.05rem;
    max-width: 46ch;
  }
  section { margin-top: 2.5rem; }
  h2 {
    font-size: .82rem;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--muted);
    margin: 0 0 1rem;
    display: flex;
    align-items: center;
    gap: .6rem;
  }
  h2 .count {
    font-variant-numeric: tabular-nums;
    background: var(--accent-soft);
    color: var(--accent);
    border-radius: 999px;
    padding: .05rem .5rem;
    font-size: .78rem;
    letter-spacing: 0;
  }
  ul.cards {
    list-style: none;
    margin: 0;
    padding: 0;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: .75rem;
  }
  ul.cards li { margin: 0; }
  ul.cards a {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: .5rem;
    padding: .9rem 1.1rem;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    box-shadow: var(--shadow);
    color: var(--text);
    text-decoration: none;
    font-weight: 600;
    transition: transform .12s ease, border-color .12s ease, background .12s ease;
  }
  ul.cards a::after {
    content: "→";
    color: var(--muted);
    transition: transform .12s ease, color .12s ease;
  }
  ul.cards a:hover {
    transform: translateY(-2px);
    background: var(--card-hover);
    border-color: var(--accent);
  }
  ul.cards a:hover::after { transform: translateX(3px); color: var(--accent); }

  #previews[hidden] { display: none; }
  .preview-list {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: .75rem;
  }
  .preview-card {
    display: flex;
    flex-direction: column;
    gap: .5rem;
    padding: 1rem 1.1rem;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    box-shadow: var(--shadow);
  }
  .preview-card .pr {
    font-size: .78rem;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
  }
  .preview-card .title {
    font-weight: 600;
    line-height: 1.3;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }
  .preview-card .links {
    display: flex;
    gap: .5rem;
    margin-top: .25rem;
    flex-wrap: wrap;
  }
  .preview-card .links a {
    text-decoration: none;
    font-size: .85rem;
    font-weight: 600;
    padding: .35rem .7rem;
    border-radius: 8px;
    border: 1px solid var(--border);
    color: var(--text);
    transition: border-color .12s ease, background .12s ease;
  }
  .preview-card .links a.open {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .preview-card .links a:hover { border-color: var(--accent); }
  .preview-card .links a.open:hover { filter: brightness(1.07); }

  footer {
    margin-top: 3rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--border);
    color: var(--muted);
    font-size: .9rem;
  }
  footer a { color: var(--accent); text-decoration: none; }
  footer a:hover { text-decoration: underline; }
</style>
</head><body>
<main>
  <header>
    <h1>Preview — PR #45</h1>
    <p class="tagline">Small, self-contained browser apps — pick one to play with.</p>
  </header>

  <section class="apps">
    <h2>Apps</h2>
    <ul class="cards">
  <li><a href="artillery/">artillery</a></li>
  <li><a href="bubble-level/">bubble-level</a></li>
  <li><a href="cold-climb/">cold-climb</a></li>
  <li><a href="git/">git</a></li>
  <li><a href="hello/">hello</a></li>
  <li><a href="kanoodle/">kanoodle</a></li>
  <li><a href="nypd-choppers/">nypd-choppers</a></li>
  <li><a href="web-push-demo/">web-push-demo</a></li>
  <li><a href="webrtc/">webrtc</a></li>
    </ul>
  </section>

  <section id="previews" hidden>
    <h2>Active previews <span class="count" id="previews-count"></span></h2>
    <div class="preview-list" id="previews-list"></div>
  </section>

  <footer id="footer"></footer>
</main>

<script>
(function () {
  // Derive owner/repo from the GitHub Pages URL: https://<owner>.github.io/<repo>/...
  var host = location.hostname || "";
  var owner = host.split(".")[0];
  var repo = (location.pathname.split("/").filter(Boolean)[0]) || "";

  // Footer link back to the source repo (best-effort).
  if (owner && repo && host.indexOf("github.io") !== -1) {
    var footer = document.getElementById("footer");
    if (footer) {
      footer.innerHTML =
        'Source on <a href="https://github.com/' + owner + "/" + repo +
        '">GitHub</a>.';
    }
  }

  // The "Active previews" list only makes sense on the production site root,
  // not inside a per-PR preview page.
  if (location.pathname.indexOf("/preview/") !== -1) return;
  if (!owner || !repo || host.indexOf("github.io") === -1) return;

  var section = document.getElementById("previews");
  var listEl = document.getElementById("previews-list");
  var countEl = document.getElementById("previews-count");

  function esc(s) {
    return String(s).replace(/[&<>"']/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
    });
  }

  function previewUrl(number) {
    return "/" + repo + "/preview/pr-" + number + "/";
  }

  // A preview is "active" only if its directory still exists on gh-pages
  // (cleanup.yml removes it when the PR closes).
  function previewExists(number) {
    return fetch(previewUrl(number), { method: "GET", cache: "no-store" })
      .then(function (r) { return r.ok; })
      .catch(function () { return false; });
  }

  function render(prs) {
    if (!prs.length) return;
    countEl.textContent = String(prs.length);
    listEl.innerHTML = prs.map(function (pr) {
      return (
        '<div class="preview-card">' +
          '<span class="pr">PR #' + pr.number + "</span>" +
          '<span class="title">' + esc(pr.title) + "</span>" +
          '<span class="links">' +
            '<a class="open" href="' + previewUrl(pr.number) + '">Open preview</a>' +
            '<a href="' + esc(pr.html_url) + '">View PR</a>' +
          "</span>" +
        "</div>"
      );
    }).join("");
    section.hidden = false;
  }

  fetch(
    "https://api.github.com/repos/" + owner + "/" + repo +
      "/pulls?state=open&per_page=100&sort=updated&direction=desc",
    { headers: { Accept: "application/vnd.github+json" } }
  )
    .then(function (r) { return r.ok ? r.json() : []; })
    .then(function (prs) {
      if (!Array.isArray(prs) || !prs.length) return;
      return Promise.all(
        prs.map(function (pr) {
          return previewExists(pr.number).then(function (ok) {
            return ok ? pr : null;
          });
        })
      ).then(function (checked) {
        render(checked.filter(Boolean));
      });
    })
    .catch(function () { /* leave the previews section hidden on any failure */ });
})();
</script>
</body></html>
