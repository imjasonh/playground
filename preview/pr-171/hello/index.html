<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello</title>
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: #f0f4f8;
    }
    .card {
      text-align: center;
      background: white;
      padding: 2rem 3rem;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0,0,0,.1);
    }
    h1 { font-size: 3rem; margin: 0 0 .5rem; }
    p  { color: #666; margin: 0; }
    #time { font-size: 1.2rem; color: #333; margin-top: 1rem; }
  </style>
</head>
<body>
  <div class="card">
    <h1>👋 Hello!</h1>
    <p>A sample static app in the playground.</p>
    <div id="time"></div>
  </div>
  <script>
    function updateTime() {
      document.getElementById('time').textContent = new Date().toLocaleTimeString();
    }
    updateTime();
    setInterval(updateTime, 1000);
  </script>
</body>
</html>
