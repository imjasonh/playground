<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"
    />
    <meta name="theme-color" content="#1a2418" />
    <title>RC Pro Loop</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main>
      <header class="hud" aria-live="polite">
        <span id="lap-value">Lap 1/3</span>
        <span id="place-value">P—</span>
        <span id="time-value">0:00</span>
      </header>

      <div class="stage">
        <canvas
          id="game-canvas"
          width="800"
          height="600"
          aria-label="RC cars on a carpet circuit"
        ></canvas>

        <div id="screen-overlay" class="overlay">
          <h1>RC Pro Loop</h1>
          <p id="overlay-copy">Three laps. Four rivals. Stay on the carpet.</p>
          <button id="start-button" type="button">Race</button>
        </div>
      </div>

      <div class="touch-bar" aria-label="Touch driving controls">
        <button id="left-control" type="button" aria-label="Steer">Steer</button>
        <button id="right-control" type="button" aria-label="Gas">Gas</button>
      </div>

      <p class="help">
        Drive with arrows or WASD · Shift boost · R restart · Space to start
      </p>
    </main>

    <script type="module" src="src/app.js"></script>
  </body>
</html>
